<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenScout Onboarding Contact Sheet</title>
  <style>
    :root {
      --bg: #070807;
      --panel: #0f100e;
      --line: rgba(255, 255, 255, 0.12);
      --ink: rgba(255, 255, 255, 0.9);
      --muted: rgba(255, 255, 255, 0.54);
      --green: #9fe047;
      --mono: "SFMono-Regular", ui-monospace, Menlo, Monaco, Consolas, monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background:
        radial-gradient(circle at 10% 8%, rgba(159, 224, 71, 0.08), transparent 28%),
        linear-gradient(135deg, #070807, #050505);
      color: var(--ink);
      font-family: var(--sans);
    }

    .sheet {
      width: 100%;
      height: 100%;
      padding: 30px;
      display: grid;
      grid-template-rows: 74px 1fr;
      gap: 20px;
    }

    header {
      border: 1px solid var(--line);
      background: rgba(8, 9, 8, 0.88);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 26px;
    }

    .kicker {
      font-family: var(--mono);
      color: var(--green);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      font-size: 11px;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-family: var(--mono);
      font-size: 21px;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .meta {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      gap: 18px;
      min-height: 0;
    }

    .grid.cli,
    .grid.desktop {
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(2, 1fr);
    }

    .grid.web {
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
    }

    .card {
      min-width: 0;
      min-height: 0;
      border: 1px solid var(--line);
      background: var(--panel);
      display: grid;
      grid-template-rows: 34px 1fr;
      overflow: hidden;
    }

    .label {
      border-bottom: 1px solid var(--line);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 10px 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    img {
      width: 100%;
      height: 100%;
      min-height: 0;
      object-fit: cover;
      object-position: top left;
      display: block;
      filter: saturate(0.96) contrast(1.03);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const mode = new URLSearchParams(location.search).get("mode") || "cli";
    const data = {
      cli: {
        title: "CLI only install",
        meta: "4 steps",
        items: [
          ["cli-01.png", "1. Install command"],
          ["cli-02.png", "2. Run setup"],
          ["cli-03.png", "3. Verify health"],
          ["cli-04.png", "4. First message"]
        ]
      },
      web: {
        title: "Web app onboarding",
        meta: "6 steps",
        items: [
          ["web-01.png", "1. Open local web"],
          ["web-02.png", "2. Local config"],
          ["web-03.png", "3. Identity"],
          ["web-04.png", "4. Project"],
          ["web-05.png", "5. Setup"],
          ["web-06.png", "6. Useful home"]
        ]
      },
      desktop: {
        title: "Desktop app onboarding",
        meta: "4 steps",
        items: [
          ["desktop-01.png", "1. Launch app"],
          ["desktop-02.png", "2. Start from menu"],
          ["desktop-03.png", "3. Same ladder"],
          ["desktop-04.png", "4. Healthy control"]
        ]
      }
    };
    const sheet = data[mode] || data.cli;
    document.getElementById("app").innerHTML = `
      <div class="sheet">
        <header>
          <div>
            <div class="kicker">OpenScout install recap</div>
            <h1>${sheet.title}</h1>
          </div>
          <div class="meta">${sheet.meta}</div>
        </header>
        <main class="grid ${mode}">
          ${sheet.items.map(([src, label]) => `
            <section class="card">
              <div class="label">${label}</div>
              <img src="./${src}" alt="${label}">
            </section>
          `).join("")}
        </main>
      </div>
    `;
  </script>
</body>
</html>
