name: CI

on:
  pull_request:
    paths:
      - ".github/workflows/*.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "apps/cloud/**"
      - "apps/desktop/**"
      - "apps/mesh-front-door/**"
      - "crates/**"
      - "packages/agent-sessions/**"
      - "packages/cli/**"
      - "packages/protocol/**"
      - "packages/runtime/**"
      - "packages/session-trace/**"
      - "packages/session-trace-react/**"
      - "packages/web/**"
      - "scripts/cargo.sh"
      - "scripts/scoutd-verify.sh"
      - "scripts/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig*.json"
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Typecheck and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync exec fence
        run: bun run sync-exec:fence

      - name: Typecheck
        run: |
          bun run --cwd packages/protocol check
          bun run --cwd packages/agent-sessions check
          bun run --cwd packages/runtime check
          bun run --cwd packages/session-trace check
          bun run --cwd packages/session-trace-react check
          bun run --cwd apps/desktop check
          bun run --cwd apps/cloud check
          bun run --cwd apps/mesh-front-door check

      - name: Unit tests
        env:
          OPENSCOUT_CONFORMANCE: "1"
        run: |
          if bun -e "const pkg = require('./package.json'); process.exit(pkg.scripts?.['test:unit'] ? 0 : 1)"; then
            bun run test:unit
          else
            bun run --cwd packages/protocol test
            bun run --cwd packages/agent-sessions test
            bun test ./packages/runtime/src/**/*.test.ts --path-ignore-patterns='**/*live.test.ts' --path-ignore-patterns='**/scenario-suite.test.ts'
            bun run --cwd apps/mesh-front-door test
            bun run --cwd apps/desktop test:happy
            bun run --cwd packages/web test:happy
            bun test packages/session-trace/src/*.test.ts packages/session-trace-react/src/*.test.tsx
          fi

  rust-scoutd:
    name: scoutd verification
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify
        run: bash scripts/scoutd-verify.sh
