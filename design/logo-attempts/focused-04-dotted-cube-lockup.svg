<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 930 280" role="img" aria-labelledby="title desc">
  <title id="title">OpenScout focused logo attempt 04: Dotted Cube lockup</title>
  <desc id="desc">A simple OpenScout wordmark with a dotted isometric cube mark as the opening O.</desc>
  <defs>
    <pattern id="dots" width="5" height="5" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#25282c" opacity="0.22"/>
    </pattern>
    <style>
      .edge { stroke: #25282c; }
      .inner { stroke: #25282c; stroke-opacity: 0.72; }
      .word { fill: #25282c; font: 760 112px Inter, "Avenir Next", "Helvetica Neue", Arial, sans-serif; }
    </style>
  </defs>
  <g transform="translate(24 22)">
    <path d="M112 8 207 63v110l-95 55-95-55V63Z" fill="url(#dots)"/>
    <path d="M112 68 156 93v50l-44 25-44-25V93Z" fill="#f7f4ea"/>
    <path class="edge" d="M112 8 207 63v110l-95 55-95-55V63Z" fill="none" stroke-width="5.6" stroke-linejoin="round"/>
    <path class="edge" d="M112 8v220M17 63l95 55 95-55M17 173l95-55 95 55" fill="none" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
    <path class="inner" d="M112 68 156 93v50l-44 25-44-25V93Z" fill="none" stroke-width="4.2" stroke-linejoin="round"/>
    <path class="inner" d="M112 68v100M68 93l44 25 44-25M68 143l44-25 44 25" fill="none" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text class="word" x="246" y="186">penScout</text>
</svg>
