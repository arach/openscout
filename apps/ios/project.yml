name: Scout
packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    exactVersion: 0.13.6
options:
  bundleIdPrefix: com.openscout
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: 2U83JFPW66
targets:
  ScoutApp:
    type: application
    platform: iOS
    sources:
      - Scout
    dependencies:
      - package: FluidAudio
    info:
      path: Scout/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSExceptionDomains:
            tail1e8e67.ts.net:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
    settings:
      base:
        PRODUCT_NAME: Scout
        PRODUCT_MODULE_NAME: ScoutApp
        PRODUCT_BUNDLE_IDENTIFIER: com.openscout.scout
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Scout
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationAllButUpsideDown"
        INFOPLIST_KEY_NSCameraUsageDescription: "Scout uses the camera to scan QR codes for mobile pairing"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Scout uses the microphone for voice-to-text input"
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Scout uses on-device speech recognition to transcribe voice input"
        MARKETING_VERSION: "0.2.16"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: Scout/ScoutDebug.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: Scout/ScoutRelease.entitlements
  ScoutTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ScoutTests
    dependencies:
      - target: ScoutApp
