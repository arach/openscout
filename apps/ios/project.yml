name: Scout
packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    exactVersion: 0.13.6
  Termini:
    url: https://github.com/arach/Termini.git
    revision: 5f337c1faf802412d83cdeabf753aead6d614780
  Hudson:
    path: ../../../hudson           # local SPM package; products HudsonShell, HudsonUI
  ScoutNativeCore:
    path: ../../packages/scout-native-core   # product ScoutCapabilities
  ScoutIOSCore:
    path: ../../packages/scout-ios-core      # product ScoutIOSCore (BridgeBrokerClient + transport)
options:
  bundleIdPrefix: com.openscout
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
schemes:
  ScoutApp:
    build:
      targets:
        ScoutApp: all
        ScoutTests: [test]
    test:
      config: Debug
      targets:
        - ScoutTests
  ScoutNext:
    build:
      targets:
        ScoutNext: all
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: 2U83JFPW66
targets:
  ScoutApp:
    type: application
    platform: iOS
    sources:
      - Scout
    dependencies:
      - package: FluidAudio
      - package: Termini
        product: Termini
      - package: Termini
        product: TerminiSSH
    info:
      path: Scout/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleURLTypes:
          - CFBundleURLName: com.openscout.scout
            CFBundleURLSchemes:
              - openscout
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            tail1e8e67.ts.net:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
        NSBonjourServices:
          - _scout-pair._tcp
        NSLocalNetworkUsageDescription: Scout connects to your Mac over your local network when both devices are nearby.
    settings:
      base:
        PRODUCT_NAME: Scout
        PRODUCT_MODULE_NAME: ScoutApp
        PRODUCT_BUNDLE_IDENTIFIER: com.openscout.scout
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Scout
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationAllButUpsideDown"
        INFOPLIST_KEY_NSCameraUsageDescription: "Scout uses the camera to scan QR codes for mobile pairing"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Scout uses the microphone for voice-to-text input"
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Scout uses on-device speech recognition to transcribe voice input"
        MARKETING_VERSION: "0.2.65"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: Scout/ScoutDebug.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: Scout/ScoutRelease.entitlements
  ScoutNext:
    type: application
    platform: iOS
    sources:
      - ScoutNext
    dependencies:
      - package: Hudson
        product: HudsonShell
      - package: Hudson
        product: HudsonUI
      - package: ScoutNativeCore
        product: ScoutCapabilities
      - package: ScoutIOSCore
        product: ScoutIOSCore
    info:
      path: ScoutNext/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        # Reach the paired Mac over the LAN (Bonjour) and Tailscale (ws over ts.net).
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            tail1e8e67.ts.net:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
        NSBonjourServices:
          - _scout-pair._tcp
        NSLocalNetworkUsageDescription: ScoutNext connects to your Mac over your local network when both devices are nearby.
        NSCameraUsageDescription: ScoutNext uses the camera to scan the pairing QR code shown on your Mac.
    settings:
      base:
        PRODUCT_NAME: ScoutNext
        PRODUCT_MODULE_NAME: ScoutNext
        PRODUCT_BUNDLE_IDENTIFIER: com.openscout.scoutnext
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: ScoutNext
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
  ScoutTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ScoutTests
    dependencies:
      - target: ScoutApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Scout.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Scout"
        BUNDLE_LOADER: "$(TEST_HOST)"
