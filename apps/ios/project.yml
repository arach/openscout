name: Scout
packages:
  Termini:
    # Local checkout pinned to the same commit as the old github revision
    # (5f337c1). Shared with hudson's `../Termini` so SwiftPM resolves ONE
    # Termini node with HudsonTerminal's local-path dependency.
    path: ../../../Termini
  Hudson:
    path: ../../../hudson           # local SPM package; products HudsonShell, HudsonUI
  ScoutNativeCore:
    path: ../../packages/scout-native-core   # product ScoutCapabilities
  ScoutIOSCore:
    path: ../../packages/scout-ios-core      # product ScoutIOSCore (BridgeBrokerClient + transport)
options:
  bundleIdPrefix: app.openscout
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
schemes:
  Scout:
    build:
      targets:
        Scout: all
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: 2U83JFPW66
targets:
  Scout:
    type: application
    platform: iOS
    sources:
      - Scout
    dependencies:
      - package: Hudson
        product: HudsonObservability
      - package: Hudson
        product: HudsonShell
      - package: Hudson
        product: HudsonUI
      - package: Hudson
        product: HudsonUIWeb       # Embedded Lanes + Dispatch mission-control surfaces
      - package: Hudson
        product: HudsonUICapture   # QR scanner (split out by the optional-iOS-features refactor)
      - package: Hudson
        product: HudsonVoice       # Embedded VoxEngine/Parakeet dictation; no Vox service runtime
      - package: Hudson
        product: HudsonTerminal    # Termini SSH/PTY surface — requires HUDSONKIT_WITH_TERMINAL=1 at SwiftPM eval
      - package: Hudson
        product: HudsonUIKeyboard  # HudHostedKeyboard — in-app terminal keyboard
      - package: Termini
        product: TerminiSSH        # TerminiConnectionConfig / TerminiSSHWorkspace for the live Terminal tab
      - package: ScoutNativeCore
        product: ScoutCapabilities
      - package: ScoutIOSCore
        product: ScoutIOSCore
    info:
      path: Scout/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        # Explicit, well-formed launch screen — a single empty top-level dict is
        # the canonical opt-in to native rendering (default background, matches the
        # dark app). Without it, OR if Xcode's generator double-wraps it into a
        # nested UILaunchScreen/UILaunchScreen, iOS rejects it and renders the whole
        # app in compatibility scaling — which looks "too wide" on the narrow 13
        # mini. Paired with removing INFOPLIST_KEY_UILaunchScreen_Generation below
        # so nothing re-wraps this one.
        UILaunchScreen: {}
        # On-device dictation (HudDictation): mic capture + Apple Speech fallback.
        NSMicrophoneUsageDescription: Scout uses the microphone to dictate messages to your agents.
        NSSpeechRecognitionUsageDescription: Scout transcribes your dictation on-device.
        # Camera-free pairing and native auth deep links:
        # scout://pair?payload=… and scout://osn-auth?session=…
        CFBundleURLTypes:
          - CFBundleURLName: app.openscout.scout
            CFBundleURLSchemes:
              - scout
        # Reach the paired Mac over the LAN (Bonjour) and Tailscale (ws over ts.net).
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            ts.net:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
        NSBonjourServices:
          - _oscout-pair._tcp
          - _scout-pair._tcp
        NSLocalNetworkUsageDescription: Scout connects to your Mac over your local network when both devices are nearby.
        NSCameraUsageDescription: Scout uses the camera to scan the pairing QR code shown on your Mac.
    # Sign in with Apple (OSN native auth). Requires the matching capability on
    # the App ID in the Apple Developer portal for runtime to succeed.
    entitlements:
      path: Scout/Scout.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_NAME: Scout
        PRODUCT_MODULE_NAME: Scout
        PRODUCT_BUNDLE_IDENTIFIER: app.openscout.scout
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Scout
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        # NOTE: no INFOPLIST_KEY_UILaunchScreen_Generation here — the launch screen
        # is declared explicitly in info.properties (UILaunchScreen: {}). Enabling
        # the generator alongside the custom Info.plist double-wraps it (nested
        # UILaunchScreen) and triggers compatibility scaling on the 13 mini.
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        MARKETING_VERSION: "0.2.70"
        CURRENT_PROJECT_VERSION: "1"
