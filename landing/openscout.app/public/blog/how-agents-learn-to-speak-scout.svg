<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">How a Scout Menu message moves through the local broker and model agents</title>
  <desc id="desc">The left side shows free local transport between the operator, Scout Menu, broker, and event stream. The right side shows metered model work through Scoutbot and an optional project agent.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111317"/>
      <stop offset="0.54" stop-color="#181a20"/>
      <stop offset="1" stop-color="#101215"/>
    </linearGradient>
    <linearGradient id="localPanel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#1d2925" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#151d1b" stop-opacity="0.72"/>
    </linearGradient>
    <linearGradient id="modelPanel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#2a2119" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#1e1916" stop-opacity="0.72"/>
    </linearGradient>
    <linearGradient id="broker" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8068f4"/>
      <stop offset="1" stop-color="#5c45d8"/>
    </linearGradient>
    <linearGradient id="agent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f3bd67"/>
      <stop offset="1" stop-color="#dc8d45"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowLocal" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L8 4L0 8Z" fill="#71d6a1"/>
    </marker>
    <marker id="arrowModel" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L8 4L0 8Z" fill="#f4b860"/>
    </marker>
    <marker id="arrowMuted" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L8 4L0 8Z" fill="#8d8a82"/>
    </marker>
    <pattern id="grain" width="90" height="90" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="15" r="0.8" fill="#fff" opacity="0.08"/>
      <circle cx="63" cy="31" r="0.7" fill="#fff" opacity="0.05"/>
      <circle cx="35" cy="72" r="0.6" fill="#fff" opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1200" height="760" rx="32" fill="url(#page)"/>
  <rect width="1200" height="760" rx="32" fill="url(#grain)"/>
  <rect x="1" y="1" width="1198" height="758" rx="31" fill="none" stroke="#fff" stroke-opacity="0.08"/>

  <text x="62" y="68" fill="#f3efe5" font-family="ui-sans-serif, system-ui, sans-serif" font-size="27" font-weight="650">One message, two cost boundaries</text>
  <text x="62" y="98" fill="#938e80" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">Scout keeps transport local. Cost begins when a model is asked to think.</text>

  <g transform="translate(48 132)">
    <rect width="552" height="564" rx="24" fill="url(#localPanel)" stroke="#6ed39f" stroke-opacity="0.22"/>
    <circle cx="34" cy="34" r="5" fill="#71d6a1" filter="url(#glow)"/>
    <text x="52" y="39" fill="#9de5bc" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="650" letter-spacing="1.2">LOCAL CONTROL PLANE</text>
    <text x="28" y="72" fill="#72837b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">No OpenScout model charge</text>

    <path d="M154 174H224" fill="none" stroke="#71d6a1" stroke-width="2" marker-end="url(#arrowLocal)"/>
    <text x="189" y="162" text-anchor="middle" fill="#8fae9d" font-family="ui-monospace, monospace" font-size="10">type</text>
    <path d="M374 174H445" fill="none" stroke="#71d6a1" stroke-width="2" marker-end="url(#arrowLocal)"/>
    <text x="410" y="162" text-anchor="middle" fill="#8fae9d" font-family="ui-monospace, monospace" font-size="10">POST /api/send</text>

    <g transform="translate(28 130)" filter="url(#shadow)">
      <rect width="126" height="88" rx="16" fill="#202b28" stroke="#71d6a1" stroke-opacity="0.42"/>
      <circle cx="22" cy="24" r="8" fill="#71d6a1" fill-opacity="0.15" stroke="#71d6a1"/>
      <path d="M17 35c2-6 8-8 11-8s9 2 11 8" fill="none" stroke="#71d6a1" stroke-linecap="round"/>
      <text x="18" y="59" fill="#eef7f1" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="620">Operator</text>
      <text x="18" y="76" fill="#7e9589" font-family="ui-monospace, monospace" font-size="10">intent</text>
    </g>

    <g transform="translate(224 130)" filter="url(#shadow)">
      <rect width="150" height="88" rx="16" fill="#202b28" stroke="#71d6a1" stroke-opacity="0.42"/>
      <rect x="18" y="16" width="22" height="17" rx="4" fill="none" stroke="#71d6a1"/>
      <path d="M23 38h12" stroke="#71d6a1" stroke-linecap="round"/>
      <text x="18" y="59" fill="#eef7f1" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="620">Scout Menu</text>
      <text x="18" y="76" fill="#7e9589" font-family="ui-monospace, monospace" font-size="10">native compose</text>
    </g>

    <g transform="translate(445 118)" filter="url(#shadow)">
      <rect width="79" height="112" rx="18" fill="url(#broker)"/>
      <path d="M25 26h29M25 34h29M25 42h29" stroke="#fff" stroke-opacity="0.8" stroke-linecap="round"/>
      <circle cx="31" cy="26" r="2" fill="#d7d0ff"/>
      <text x="39.5" y="73" text-anchor="middle" fill="#fff" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650">Local</text>
      <text x="39.5" y="90" text-anchor="middle" fill="#fff" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650">broker</text>
    </g>

    <path d="M484 230V307H299" fill="none" stroke="#71d6a1" stroke-width="2" marker-end="url(#arrowLocal)"/>
    <text x="392" y="295" text-anchor="middle" fill="#8fae9d" font-family="ui-monospace, monospace" font-size="10">durable message.posted</text>

    <g transform="translate(205 271)">
      <rect width="188" height="74" rx="15" fill="#19221f" stroke="#71d6a1" stroke-opacity="0.34"/>
      <path d="M20 22h20M20 30h14M20 38h17" stroke="#71d6a1" stroke-linecap="round"/>
      <text x="54" y="28" fill="#d8eae0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600">Broker state</text>
      <text x="54" y="47" fill="#7e9589" font-family="ui-monospace, monospace" font-size="10">messages · flights · agents</text>
      <text x="54" y="62" fill="#7e9589" font-family="ui-monospace, monospace" font-size="10">durable coordination facts</text>
    </g>

    <path d="M205 330H103V399" fill="none" stroke="#71d6a1" stroke-width="2" marker-end="url(#arrowLocal)"/>
    <text x="100" y="365" fill="#8fae9d" font-family="ui-monospace, monospace" font-size="10">/api/events</text>
    <g transform="translate(28 399)">
      <rect width="244" height="91" rx="16" fill="#19221f" stroke="#71d6a1" stroke-opacity="0.34"/>
      <circle cx="26" cy="28" r="6" fill="#71d6a1"/>
      <path d="M38 28h20" stroke="#71d6a1" stroke-width="2" stroke-linecap="round"/>
      <text x="18" y="58" fill="#d8eae0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600">SSE response stream</text>
      <text x="18" y="76" fill="#7e9589" font-family="ui-monospace, monospace" font-size="10">append the reply in the Menu</text>
    </g>

    <rect x="300" y="406" width="224" height="78" rx="16" fill="#202b28" stroke="#71d6a1" stroke-opacity="0.24" stroke-dasharray="5 5"/>
    <text x="318" y="433" fill="#9de5bc" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="620">Direct answer path</text>
    <text x="318" y="454" fill="#7e9589" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">Known broker fact → one concise</text>
    <text x="318" y="470" fill="#7e9589" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">concierge reply → local stream</text>
  </g>

  <g transform="translate(624 132)">
    <rect width="528" height="564" rx="24" fill="url(#modelPanel)" stroke="#f4b860" stroke-opacity="0.24"/>
    <circle cx="34" cy="34" r="5" fill="#f4b860" filter="url(#glow)"/>
    <text x="52" y="39" fill="#ffd597" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="650" letter-spacing="1.2">MODEL WORK</text>
    <text x="28" y="72" fill="#9a8063" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">ChatGPT allowance or API token rates</text>

    <path d="M0 174H58" fill="none" stroke="#f4b860" stroke-width="2" marker-end="url(#arrowModel)"/>
    <text x="28" y="161" text-anchor="middle" fill="#b79b77" font-family="ui-monospace, monospace" font-size="10">wake</text>

    <g transform="translate(58 118)" filter="url(#shadow)">
      <rect width="205" height="112" rx="18" fill="url(#agent)"/>
      <circle cx="28" cy="29" r="11" fill="#151311" fill-opacity="0.16"/>
      <path d="M22 29h12M28 23v12" stroke="#2b2116" stroke-width="1.5" stroke-linecap="round"/>
      <text x="18" y="62" fill="#2b2116" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">Scoutbot</text>
      <text x="18" y="82" fill="#654622" font-family="ui-monospace, monospace" font-size="10">low reasoning · Scout MCP</text>
      <text x="18" y="98" fill="#654622" font-family="ui-monospace, monospace" font-size="10">no shell · no repo writes</text>
    </g>

    <g transform="translate(302 131)">
      <rect width="196" height="86" rx="16" fill="#231e18" stroke="#f4b860" stroke-opacity="0.38"/>
      <text x="18" y="29" fill="#f7d6a6" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="620">Scout MCP allowlist</text>
      <text x="18" y="49" fill="#9a8063" font-family="ui-monospace, monospace" font-size="10">read broker state</text>
      <text x="18" y="66" fill="#9a8063" font-family="ui-monospace, monospace" font-size="10">messages_send · ask</text>
    </g>
    <path d="M263 174H302" fill="none" stroke="#f4b860" stroke-width="2" marker-end="url(#arrowModel)"/>

    <path d="M160 230V298" fill="none" stroke="#f4b860" stroke-width="2" marker-end="url(#arrowModel)"/>
    <rect x="86" y="252" width="149" height="24" rx="12" fill="#332719" stroke="#f4b860" stroke-opacity="0.26"/>
    <text x="160.5" y="268" text-anchor="middle" fill="#d5af79" font-family="ui-monospace, monospace" font-size="9">ask: owned repo work</text>

    <g transform="translate(55 298)" filter="url(#shadow)">
      <rect width="220" height="118" rx="18" fill="#24201c" stroke="#f4b860" stroke-opacity="0.42"/>
      <circle cx="29" cy="28" r="10" fill="#f4b860" fill-opacity="0.14" stroke="#f4b860"/>
      <path d="M23 28h12M29 22v12" stroke="#f4b860" stroke-linecap="round"/>
      <text x="18" y="62" fill="#f7ecdd" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="650">Project agent</text>
      <text x="18" y="83" fill="#a58a6a" font-family="ui-monospace, monospace" font-size="10">role · tools · AGENTS.md</text>
      <text x="18" y="100" fill="#a58a6a" font-family="ui-monospace, monospace" font-size="10">Scout skill · reply context</text>
    </g>

    <path d="M275 357H322" fill="none" stroke="#f4b860" stroke-width="2" marker-end="url(#arrowModel)"/>
    <g transform="translate(322 309)">
      <rect width="176" height="96" rx="16" fill="#231e18" stroke="#f4b860" stroke-opacity="0.34"/>
      <path d="M19 24h17l6 6h27v28H19z" fill="none" stroke="#f4b860"/>
      <text x="18" y="72" fill="#f7d6a6" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="620">Repo &amp; tools</text>
      <text x="18" y="87" fill="#9a8063" font-family="ui-monospace, monospace" font-size="10">as explicitly granted</text>
    </g>

    <path d="M165 416V469H-24V419" fill="none" stroke="#8d8a82" stroke-width="1.6" stroke-dasharray="6 6" marker-end="url(#arrowMuted)"/>
    <text x="70" y="488" text-anchor="middle" fill="#8d8a82" font-family="ui-monospace, monospace" font-size="10">final reply returns through the broker</text>

    <rect x="292" y="444" width="206" height="68" rx="16" fill="#2a2119" stroke="#f4b860" stroke-opacity="0.24" stroke-dasharray="5 5"/>
    <text x="310" y="470" fill="#ffd597" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="620">Delegated path</text>
    <text x="310" y="491" fill="#9a8063" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">Concierge turn + worker turn</text>
  </g>

  <g transform="translate(523 116)">
    <rect width="154" height="32" rx="16" fill="#191a1e" stroke="#f4b860" stroke-opacity="0.34"/>
    <text x="77" y="21" text-anchor="middle" fill="#d6b27c" font-family="ui-monospace, monospace" font-size="10" font-weight="650">MODEL BOUNDARY</text>
  </g>
</svg>
