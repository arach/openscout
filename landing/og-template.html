      <span style="font-family:'Geist Mono',ui-monospace,monospace;font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:#9a978f;">{{tag}}</span>
    </div>

    <!-- title block -->
    <div style="display:flex;flex-direction:column;gap:12px;max-width:860px;">
      <h1 style="font-family:Georgia,serif;font-size:72px;font-weight:400;font-style:italic;line-height:1.08;letter-spacing:-0.03em;color:#111110;margin:0;">{{title}}</h1>
      <p style="font-size:22px;line-height:1.5;color:#4a4843;margin:0;max-width:640px;font-weight:400;">{{subtitle}}</p>
    </div>

    <!-- footer -->
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span style="font-family:'Geist Mono',ui-monospace,monospace;font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:#c8c4ba;">openscout.app</span>
      <span style="font-size:13px;color:#c8c4ba;">Open source. Local-first.</span>
    </div>

  </div>

</body>
</html>
