<html>
<body style="width:1200px;height:630px;display:flex;flex-direction:column;justify-content:space-between;padding:72px 80px;background:#f4f6f8;font-family:system-ui,-apple-system,sans-serif;color:#252a31;margin:0;">

  <div style="display:flex;align-items:center;gap:14px;">
    <div style="width:36px;height:36px;border-radius:10px;background:#5b84ff;flex-shrink:0;"></div>
    <span style="font-size:18px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;color:#7e8793;">Scout</span>
    <span style="font-size:14px;font-weight:500;color:#5b84ff;background:rgba(91,132,255,0.1);padding:4px 12px;border-radius:6px;margin-left:8px;">{{tag}}</span>
  </div>

  <div style="display:flex;flex-direction:column;gap:16px;">
    <h1 style="font-size:72px;font-weight:600;line-height:1.05;letter-spacing:-0.03em;color:#252a31;margin:0;">{{title}}</h1>
    <p style="font-size:26px;line-height:1.4;color:#7e8793;margin:0;max-width:800px;">{{subtitle}}</p>
  </div>

  <div style="display:flex;justify-content:space-between;align-items:center;">
    <span style="font-size:16px;color:#b6bcc5;flex-shrink:0;">openscout.app</span>
    <div style="width:100%;max-width:600px;height:1px;background:rgba(15,23,42,0.09);margin-left:24px;"></div>
  </div>

</body>
</html>
