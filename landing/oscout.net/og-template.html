<html>
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,400;1,9..144,600&family=Spectral:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body style="width:1200px;height:630px;display:flex;flex-direction:column;padding:0;background:#f5f4ef;font-family:system-ui,-apple-system,sans-serif;color:#111110;margin:0;overflow:hidden;">

  <!-- dot grid overlay -->
  <div style="position:absolute;top:0;left:0;width:1200px;height:630px;background-image:radial-gradient(circle, #c8c4ba 0.8px, transparent 0.8px);background-size:28px 28px;opacity:0.18;"></div>

  <!-- subtle hero glow (rust accent, matches --site-glow-b) -->
  <div style="position:absolute;top:0;right:0;width:600px;height:400px;background:radial-gradient(ellipse 80% 80% at 80% 20%, rgba(168,85,28,0.08), transparent);"></div>

  <div style="display:flex;flex-direction:column;justify-content:space-between;padding:60px 72px 52px;flex:1;position:relative;">

    <!-- header: logo + tag -->
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div style="display:flex;align-items:center;gap:14px;">
        <svg viewBox="0 0 32 32" width="44" height="44" fill="none" stroke="#111110" style="display:block;">
          <line x1="16" y1="16" x2="16" y2="6" stroke-width="1" opacity="0.45" />
          <line x1="16" y1="16" x2="6" y2="22" stroke-width="1" opacity="0.45" />
          <line x1="16" y1="16" x2="26" y2="22" stroke-width="1" opacity="0.45" />
          <circle cx="16" cy="6" r="2" fill="#111110" stroke="none" />
          <circle cx="6" cy="22" r="2" fill="#111110" stroke="none" />
          <circle cx="26" cy="22" r="2" fill="#111110" stroke="none" />
          <circle cx="16" cy="16" r="3.4" fill="#111110" stroke="none" />
          <circle cx="16" cy="16" r="3.4" fill="none" stroke="#f5f4ef" stroke-width="1.2" opacity="0.9" />
          <circle cx="16" cy="16" r="2" fill="#111110" stroke="none" />
        </svg>
        <span style="font-size:34px;font-weight:600;font-style:normal;color:#111110;letter-spacing:-0.02em;font-family:'Spectral',Georgia,serif;">Scout</span>
      </div>
      <span style="font-family:'Geist Mono',ui-monospace,monospace;font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:#8b8579;">{{tag}}</span>
    </div>

    <!-- title block -->
    <div style="display:flex;flex-direction:column;gap:12px;max-width:860px;">
      <h1 style="font-family:Georgia,serif;font-size:72px;font-weight:400;font-style:italic;line-height:1.08;letter-spacing:-0.03em;color:#111110;margin:0;">{{title}}</h1>
      <p style="font-size:22px;line-height:1.5;color:#4d4b45;margin:0;max-width:640px;font-weight:400;">{{subtitle}}</p>
    </div>

    <!-- footer -->
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span style="font-family:'Geist Mono',ui-monospace,monospace;font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:#9a978f;">openscout.app</span>
      <span style="font-size:13px;color:#9a978f;">Open source. Local-first.</span>
    </div>

  </div>

</body>
</html>
