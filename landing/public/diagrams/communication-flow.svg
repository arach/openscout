  </defs>

  <!-- ─── Agent Session A ─── -->
  <rect x="40" y="15" width="720" height="125" rx="3"
        fill="#fefce8" stroke="#c8b860" stroke-width="1.5"/>
  <text x="400" y="38" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#666">
    Agent Session — Claude Code
  </text>

  <rect x="65"  y="52" width="190" height="68" rx="3"
        fill="#ddd5ea" stroke="#b8a8d0" stroke-width="1"/>
  <text x="160" y="90" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333">
