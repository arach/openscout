  </text>

  <line x1="400" y1="323" x2="400" y2="343"
        stroke="#555" stroke-width="1.5"/>

  <rect x="210" y="343" width="380" height="58" rx="3"
        fill="#ddd5ea" stroke="#b8a8d0" stroke-width="1"/>
  <text x="400" y="376" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333">
