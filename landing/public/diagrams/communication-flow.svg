  </text>

  <!-- ─── Scout Broker ─── -->
  <rect x="180" y="225" width="440" height="195" rx="3"
        fill="#fefce8" stroke="#c8b860" stroke-width="1.5"/>
  <text x="400" y="250" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#666">
