  </text>

  <rect x="280" y="52" width="230" height="68" rx="3"
        fill="#ddd5ea" stroke="#b8a8d0" stroke-width="1"/>
  <text x="395" y="90" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333">
