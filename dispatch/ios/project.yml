name: Plexus
packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    branch: main
options:
  bundleIdPrefix: com.plexus
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: 2U83JFPW66
targets:
  Plexus:
    type: application
    platform: iOS
    sources:
      - Plexus
    dependencies:
      - package: FluidAudio
    info:
      path: Plexus/Info.plist
      properties:
        NSAppTransportSecurity:
          NSExceptionDomains:
            tail1e8e67.ts.net:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
    settings:
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationAllButUpsideDown"
      INFOPLIST_KEY_NSCameraUsageDescription: "Plexus uses the camera to scan QR codes for bridge pairing"
      INFOPLIST_KEY_NSMicrophoneUsageDescription: "Plexus uses the microphone for voice-to-text input"
      INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Plexus uses on-device speech recognition to transcribe voice input"
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  PlexusTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PlexusTests
    dependencies:
      - target: Plexus
