name: Dispatch
packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    branch: main
options:
  bundleIdPrefix: com.openscout
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: 2U83JFPW66
targets:
  Dispatch:
    type: application
    platform: iOS
    sources:
      - Dispatch
    dependencies:
      - package: FluidAudio
    info:
      path: Dispatch/Info.plist
      properties:
        NSAppTransportSecurity:
          NSExceptionDomains:
            tail1e8e67.ts.net:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.openscout.dispatch
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_CFBundleDisplayName: Dispatch
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationAllButUpsideDown"
      INFOPLIST_KEY_NSCameraUsageDescription: "Dispatch uses the camera to scan QR codes for bridge pairing"
      INFOPLIST_KEY_NSMicrophoneUsageDescription: "Dispatch uses the microphone for voice-to-text input"
      INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Dispatch uses on-device speech recognition to transcribe voice input"
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  DispatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - DispatchTests
    dependencies:
      - target: Dispatch
